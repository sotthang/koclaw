services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: koclaw-sandbox:latest
    # 빌드만 하고 실행하지 않음 (koclaw가 docker run으로 직접 띄움)
    profiles:
      - build-only

  koclaw:
    build: .
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Seoul
      - WORKSPACE_HOST_PATH=${WORKSPACE_HOST_PATH:-${PWD}/storage/workspace}
    volumes:
      # DB와 workspace는 컨테이너 재시작해도 유지
      - ./storage:/app/storage
      # 세션 컨테이너 생성을 위해 Docker socket 마운트
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
