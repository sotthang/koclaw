services:
  computer-use:
    build:
      context: .
      dockerfile: Dockerfile.computer_use
    image: koclaw-computer-use:latest
    # 빌드만 하고 실행하지 않음 (koclaw가 docker run으로 직접 띄움)
    profiles:
      - build-only

  koclaw:
    build: .
    user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"
    group_add:
      - "${DOCKER_GID:-999}"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Seoul
      # Docker 안에서 실행 시 volume mount용 호스트 실제 경로 (기본값: PWD/storage/workspace)
      - HOST_WORKSPACE_DIR=${PWD}/storage/workspace
    volumes:
      # DB와 workspace는 컨테이너 재시작해도 유지
      - ./storage:/app/storage
      # computer_use 컨테이너 생성을 위해 Docker socket 마운트
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
